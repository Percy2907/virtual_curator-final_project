<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Virtual Curator | Art Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>The Virtual Curator</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#" id="view-collection">My Collection</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="search-section">
            <input type="text" id="search-input" placeholder="Search art (e.g., 'Van Gogh')...">
            <button id="search-button">Search</button>
            <button id="random-button" class="btn-secondary">Surprise Me!</button>
        </section>

        <section id="gallery-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="gallery-title">Art Gallery</h2>
            <button id="clear-collection" class="btn-danger" style="display: none;">Clear All Collection</button>
        </section>

        <section id="gallery" class="art-grid"></section>
    </main>

    <footer>
        <p>&copy; 2026 Percy Yarleque | Data provided by The Met Museum API</p>
    </footer>

    <div id="bio-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-artist-name">Artist Name</h2>
            <h3 id="modal-art-title">Art Title</h3>
            
            <div id="modal-image-container" style="text-align: center; margin-bottom: 20px;">
                <img id="modal-art-image" src="" alt="Artwork detail" title="Click to enlarge">
            </div>

            <div id="art-technical-details">
                <p><strong>Date:</strong> <span id="modal-art-date"></span></p>
                <p><strong>Medium:</strong> <span id="modal-art-medium"></span></p>
                <p><strong>Culture:</strong> <span id="modal-art-culture"></span></p>
            </div>
            
            <hr class="modal-divider">
            
            <p id="modal-bio-text">Loading biography...</p>
            <a id="modal-link" href="#" target="_blank">Read more on Wikipedia</a>
        </div>
    </div>

    <div id="lightbox" class="modal hidden">
        <img id="lightbox-img" src="" alt="Full screen artwork">
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
